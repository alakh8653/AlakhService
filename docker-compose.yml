version: "3.9"


services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alakhservice}
      POSTGRES_USER: ${POSTGRES_USER:-alakh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alakh_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - alakh-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alakh}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    networks:
      - alakh-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped

# =============================================================================
# AlakhService — Docker Compose Orchestration
# Starts all infrastructure and microservices for local development.
# Usage: docker compose up -d
# =============================================================================

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - alakhservice_network
  env_file:
    - .env

x-python-service: &python-service
  <<: *service-defaults
  build:
    context: .
    dockerfile_inline: |
      FROM python:3.11-slim
      WORKDIR /app
      COPY requirements.txt* ./
      RUN pip install --no-cache-dir -r requirements.txt 2>/dev/null || true
      COPY . .
      CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_started

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:15-alpine
    <<: *service-defaults
    container_name: alakh_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alakh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alakhpassword}
      POSTGRES_DB: ${POSTGRES_DB:-alakhservice_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alakh} -d ${POSTGRES_DB:-alakhservice_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: *service-defaults
    container_name: alakh_redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    <<: *service-defaults
    container_name: alakh_zookeeper

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

    networks:
      - alakh-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - alakh-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-elastic_secret}
    ports:
      - "${ELASTIC_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - alakh-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret}
      MINIO_BROWSER: ${MINIO_BROWSER:-off}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - alakh-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    image: alakhservice/api-gateway:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      PORT: ${API_GATEWAY_PORT:-8000}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      AUTH_SERVICE_URL: http://auth-service:8001
      USER_SERVICE_URL: http://user-service:8002
      SHOP_SERVICE_URL: http://shop-service:8003
      BOOKING_SERVICE_URL: http://booking-service:8004
      PAYMENT_SERVICE_URL: http://payment-service:8005
      NOTIFICATION_SERVICE_URL: http://notification-service:8006
      TRACKING_SERVICE_URL: http://tracking-service:8007
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    networks:
      - alakh-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    image: alakhservice/auth-service:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8001
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakh_secret}@postgres:5432/${POSTGRES_DB:-alakhservice}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
    networks:
      - alakh-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    image: alakhservice/user-service:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PORT: 8002
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakh_secret}@postgres:5432/${POSTGRES_DB:-alakhservice}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_secret}
      SECRET_KEY: ${SECRET_KEY}
    networks:
      - alakh-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  shop-service:
    build:
      context: ./services/shop-service
      dockerfile: Dockerfile
    image: alakhservice/shop-service:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 8003
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakh_secret}@postgres:5432/${POSTGRES_DB:-alakhservice}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECRET_KEY: ${SECRET_KEY}
    networks:
      - alakh-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    image: alakhservice/booking-service:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8004
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakh_secret}@postgres:5432/${POSTGRES_DB:-alakhservice}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECRET_KEY: ${SECRET_KEY}
    networks:
      - alakh-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    image: alakhservice/payment-service:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 8005
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakh_secret}@postgres:5432/${POSTGRES_DB:-alakhservice}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SECRET_KEY: ${SECRET_KEY}
    networks:
      - alakh-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    image: alakhservice/notification-service:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8006
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/3
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY}
      SECRET_KEY: ${SECRET_KEY}
    networks:
      - alakh-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  tracking-service:
    build:
      context: ./services/tracking-service
      dockerfile: Dockerfile
    image: alakhservice/tracking-service:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 8007
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/4
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECRET_KEY: ${SECRET_KEY}
    networks:
      - alakh-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  kafka_data:
  zookeeper_data:
  minio_data:

networks:
  alakh-net:

      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    <<: *service-defaults
    container_name: alakh_kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ---------------------------------------------------------------------------
  # API Gateway
  # ---------------------------------------------------------------------------

  api_gateway:
    <<: *service-defaults
    container_name: alakh_api_gateway
    build:
      context: ./gateway
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${ENVIRONMENT:-development}
      AUTH_SERVICE_URL: http://auth_service:8000
      USER_SERVICE_URL: http://user_service:8000
      SHOP_SERVICE_URL: http://shop_service:8000
      BOOKING_SERVICE_URL: http://booking_service:8000
      PAYMENT_SERVICE_URL: http://payment_service:8000
      NOTIFICATION_SERVICE_URL: http://notification_service:8000
      TRACKING_SERVICE_URL: http://tracking_service:8000
      QUEUE_SERVICE_URL: http://queue_service:8000
      DISPATCH_SERVICE_URL: http://dispatch_service:8000
      ANALYTICS_SERVICE_URL: http://analytics_service:8000
      DISPUTE_SERVICE_URL: http://dispute_service:8000
      TRUST_RISK_SERVICE_URL: http://trust_risk_service:8000
      ADMIN_SERVICE_URL: http://admin_service:8000
      COMPLIANCE_SERVICE_URL: http://compliance_service:8000
      PRICING_ENGINE_URL: http://pricing_engine:8000
      SERVICE_CATALOG_URL: http://service_catalog_service:8000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-changeme}
    depends_on:
      - auth_service
      - user_service

  # ---------------------------------------------------------------------------
  # Microservices
  # ---------------------------------------------------------------------------

  auth_service:
    <<: *python-service
    container_name: alakh_auth_service
    build:
      context: ./services/auth_service
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/auth_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-changeme}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-30}

  user_service:
    <<: *python-service
    container_name: alakh_user_service
    build:
      context: ./services/user_service
    ports:
      - "${USER_SERVICE_PORT:-8002}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/user_db
      REDIS_URL: redis://redis:6379/1
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-alakhservice-media}

  shop_service:
    <<: *python-service
    container_name: alakh_shop_service
    build:
      context: ./services/shop_service
    ports:
      - "${SHOP_SERVICE_PORT:-8003}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/shop_db
      REDIS_URL: redis://redis:6379/2
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  booking_service:
    <<: *python-service
    container_name: alakh_booking_service
    build:
      context: ./services/booking_service
    ports:
      - "${BOOKING_SERVICE_PORT:-8004}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/booking_db
      REDIS_URL: redis://redis:6379/3
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PRICING_ENGINE_URL: http://pricing_engine:8000
      QUEUE_SERVICE_URL: http://queue_service:8000

  payment_service:
    <<: *python-service
    container_name: alakh_payment_service
    build:
      context: ./services/payment_service
    ports:
      - "${PAYMENT_SERVICE_PORT:-8005}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/payment_db
      REDIS_URL: redis://redis:6379/4
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}

  notification_service:
    <<: *python-service
    container_name: alakh_notification_service
    build:
      context: ./services/notification_service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8006}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/notification_db
      REDIS_URL: redis://redis:6379/5
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@alakhservice.com}
      FIREBASE_SERVER_KEY: ${FIREBASE_SERVER_KEY}

  tracking_service:
    <<: *python-service
    container_name: alakh_tracking_service
    build:
      context: ./services/tracking_service
    ports:
      - "${TRACKING_SERVICE_PORT:-8007}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/tracking_db
      REDIS_URL: redis://redis:6379/6
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  queue_service:
    <<: *python-service
    container_name: alakh_queue_service
    build:
      context: ./services/queue_service
    ports:
      - "${QUEUE_SERVICE_PORT:-8008}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/queue_db
      REDIS_URL: redis://redis:6379/7
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  dispatch_service:
    <<: *python-service
    container_name: alakh_dispatch_service
    build:
      context: ./services/dispatch_service
    ports:
      - "${DISPATCH_SERVICE_PORT:-8009}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/dispatch_db
      REDIS_URL: redis://redis:6379/8
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TRACKING_SERVICE_URL: http://tracking_service:8000
      QUEUE_SERVICE_URL: http://queue_service:8000

  analytics_service:
    <<: *python-service
    container_name: alakh_analytics_service
    build:
      context: ./services/analytics_service
    ports:
      - "${ANALYTICS_SERVICE_PORT:-8010}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/analytics_db
      REDIS_URL: redis://redis:6379/9
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  dispute_service:
    <<: *python-service
    container_name: alakh_dispute_service
    build:
      context: ./services/dispute_service
    ports:
      - "${DISPUTE_SERVICE_PORT:-8011}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/dispute_db
      REDIS_URL: redis://redis:6379/10
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-alakhservice-media}

  trust_risk_service:
    <<: *python-service
    container_name: alakh_trust_risk_service
    build:
      context: ./services/trust_risk_service
    ports:
      - "${TRUST_RISK_SERVICE_PORT:-8012}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/trust_risk_db
      REDIS_URL: redis://redis:6379/11
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ML_PLATFORM_URL: http://ml_platform:8000

  admin_service:
    <<: *python-service
    container_name: alakh_admin_service
    build:
      context: ./services/admin_service
    ports:
      - "${ADMIN_SERVICE_PORT:-8013}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/admin_db
      REDIS_URL: redis://redis:6379/12
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  compliance_service:
    <<: *python-service
    container_name: alakh_compliance_service
    build:
      context: ./services/compliance_service
    ports:
      - "${COMPLIANCE_SERVICE_PORT:-8014}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/compliance_db
      REDIS_URL: redis://redis:6379/13
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  pricing_engine:
    <<: *python-service
    container_name: alakh_pricing_engine
    build:
      context: ./services/pricing_engine
    ports:
      - "${PRICING_ENGINE_PORT:-8015}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/pricing_db
      REDIS_URL: redis://redis:6379/14
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ML_PLATFORM_URL: http://ml_platform:8000

  service_catalog_service:
    <<: *python-service
    container_name: alakh_service_catalog
    build:
      context: ./services/service_catalog_service
    ports:
      - "${SERVICE_CATALOG_PORT:-8016}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/catalog_db
      REDIS_URL: redis://redis:6379/15
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  ml_platform:
    <<: *python-service
    container_name: alakh_ml_platform
    build:
      context: ./services/ml_platform
    ports:
      - "${ML_PLATFORM_PORT:-8017}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alakh}:${POSTGRES_PASSWORD:-alakhpassword}@postgres:5432/ml_db
      REDIS_URL: redis://redis:6379/16
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-alakhservice-media}
      MODEL_STORE_PATH: /models
    volumes:
      - ml_models:/models

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: alakhservice_postgres_data
  redis_data:
    name: alakhservice_redis_data
  kafka_data:
    name: alakhservice_kafka_data
  zookeeper_data:
    name: alakhservice_zookeeper_data
  zookeeper_log:
    name: alakhservice_zookeeper_log
  ml_models:
    name: alakhservice_ml_models

# =============================================================================
# Networks
# =============================================================================
networks:
  alakhservice_network:
    name: alakhservice_network

    driver: bridge
