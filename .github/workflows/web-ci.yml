name: Web CI

on:
  push:
    branches: [main, develop]

    paths: ['apps/**_web/**']
  pull_request:
    paths: ['apps/**_web/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [shop_dashboard_web, admin_dashboard_web]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test -- --watchAll=false --coverage
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.app }}-dist
          path: apps/${{ matrix.app }}/dist
          retention-days: 7

    paths:
      - "apps/*_web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/*_web/**"
      - ".github/workflows/web-ci.yml"

env:
  NODE_VERSION: "18"

jobs:
  # ---------------------------------------------------------------------------
  # Lint + Test + Build (matrix over each web app)
  # ---------------------------------------------------------------------------
  lint-test-build:
    name: "${{ matrix.app }} — lint / test / build"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app:
          - admin_web
          - customer_web
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # Lint
      # -----------------------------------------------------------------------
      - name: Run ESLint
        run: npm run lint

      # -----------------------------------------------------------------------
      # Type-check
      # -----------------------------------------------------------------------
      - name: TypeScript type-check
        run: npm run type-check --if-present

      # -----------------------------------------------------------------------
      # Test
      # -----------------------------------------------------------------------
      - name: Run tests
        run: npm run test -- --watchAll=false --coverage --ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.app }}
          path: apps/${{ matrix.app }}/coverage/
          retention-days: 14

      # -----------------------------------------------------------------------
      # Build
      # -----------------------------------------------------------------------
      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.app }}
          path: apps/${{ matrix.app }}/dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Verify bundle sizes (optional quality gate)
  # ---------------------------------------------------------------------------
  bundle-size:
    name: Bundle size check
    runs-on: ubuntu-latest
    needs: lint-test-build
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        app:
          - admin_web
          - customer_web

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.app }}
          path: dist/

      - name: Report bundle size
        run: |
          echo "### ${{ matrix.app }} bundle sizes" >> $GITHUB_STEP_SUMMARY
          du -sh dist/ >> $GITHUB_STEP_SUMMARY
          find dist/ -name "*.js" -o -name "*.css" | xargs du -sh | sort -h >> $GITHUB_STEP_SUMMARY

