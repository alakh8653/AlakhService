name: alakh_service
description: AlakhService - Enterprise-Grade Service Booking Mobile Application
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  dio: ^5.3.2
  get_it: ^7.6.4
  equatable: ^2.0.5
  dartz: ^0.10.1
  shared_preferences: ^2.2.1
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.7
  google_maps_flutter: ^2.5.0
  web_socket_channel: ^2.4.0
  cached_network_image: ^3.3.0
  intl: ^0.18.1
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  connectivity_plus: ^5.0.1
  encrypt: ^5.0.3
  go_router: ^12.1.1
  fl_chart: ^0.64.0
  image_picker: ^1.0.4
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.4
  mockito: ^5.4.3
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  freezed: ^2.4.5
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
