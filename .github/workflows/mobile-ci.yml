name: Mobile CI

on:
  push:
    branches: [main, develop]

    paths: ['mobile/**', '.github/workflows/mobile-ci.yml']
  pull_request:
    branches: [main, develop]
    paths: ['mobile/**']

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        working-directory: mobile

      - name: Analyze
        run: flutter analyze --no-pub
        working-directory: mobile

      - name: Run tests
        run: flutter test --coverage
        working-directory: mobile

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: mobile/coverage/lcov.info
          flags: mobile

  build-apk:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Build APK
        run: flutter build apk --release --split-per-abi
        working-directory: mobile

    paths:
      - "apps/mobile_app/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/mobile_app/**"
      - ".github/workflows/mobile-ci.yml"

env:
  FLUTTER_VERSION: "3.22.0"
  JAVA_VERSION: "17"

jobs:
  # ---------------------------------------------------------------------------
  # Analyze & Test
  # ---------------------------------------------------------------------------
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/mobile_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Verify dependencies
        run: flutter pub deps

      - name: Analyze (flutter analyze)
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run unit & widget tests
        run: |
          flutter test \
            --coverage \
            --reporter=expanded

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flutter-coverage
          path: apps/mobile_app/coverage/lcov.info
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Build Android APK (release)
  # ---------------------------------------------------------------------------
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/mobile_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons


      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:

          name: android-apk
          path: mobile/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  build-ios:
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Build IPA (no-codesign)
        run: flutter build ios --release --no-codesign
        working-directory: mobile

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: mobile/build/ios/iphoneos/*.app
          retention-days: 30

          name: release-apk
          path: apps/mobile_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Build iOS (compile check — no code signing required)
  # ---------------------------------------------------------------------------
  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-latest
    needs: test
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/mobile_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

