version: 2
updates:
  - package-ecosystem: pip
    directory: /services/auth_service
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /apps/shop_dashboard_web
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /apps/admin_dashboard_web
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /services/api_gateway
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
